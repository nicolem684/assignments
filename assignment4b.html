<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping - Assignment 4b</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    // Reference to Mapbox JavaScript
     <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>

    // Reference to Mapbox CSS 
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />

    // Additional CSS
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
  </head>

  <body>
    // Map div
    <div id='map'></div>

    // JavaScript 
    <script> 
      // Mapbox access token
        mapboxgl.accessToken = 'pk.eyJ1Ijoibm1hbjQiLCJhIjoiY21uZjZtM3VpMDc2cDJ4b2g3Z3ZyaGt5MSJ9.gkzJyjNAOfJNmCPL5mVG2Q';
   
      // Initializing the map
        var map = new mapboxgl.Map({
          container: 'map', // id of a div on your page, where the map will be inserted
          style: 'mapbox://styles/nman4/cmoj0xvwa001n01st6f3qcw67', // stylesheet location
          center: [-160, 20], // starting position [lng, lat] eg. [-122.6788, 45.5212]
          zoom: 1.25 // starting zoom 
        });

      // Zoom contols
        map.addControl(new mapboxgl.NavigationControl({
          showCompass: false
        }), 'bottom-left'); 
    </script>
  </body>
</html>
