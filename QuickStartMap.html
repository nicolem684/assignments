<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>


          
    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">

    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
        #banner { z-index: 9999; 
         background-color: white; 
         opacity: 80%; 
         text-align: center;
         padding: 10px;
        }
        h1, h2, a, p {
          color: #003049;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
      <div id='map'></div>
    <!--  Insert the title div here (part VI) -->
      <div id='banner'>
     		<h1>Portland Weekend Trip</h1>
     		<h2>By: Nicole Manning Lorino</h2>
 	    </div>
    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
          mapboxgl.accessToken = 'pk.eyJ1Ijoibm1hbjQiLCJhIjoiY21ubzQyd2prMHRwYzJwcHM5eHppYnMxeSJ9.M2t9CUbHNkaZ0yWeooe3_g';
   
        // Then initialize the map here (Part 2.2)
          var map = new mapboxgl.Map({
            container: 'map', // id of a div on your page, where the map will be inserted
            style: 'mapbox://styles/nman4/cmnr3cqm1002501sr32hr0dse', // stylesheet location
            center: [-122.6788, 45.5212], // starting position [lng, lat] eg. [-122.6788, 45.5212]
            zoom: 13 // starting zoom 
          });
        // Add the zoom contols here (part V)
          map.addControl(new mapboxgl.NavigationControl({
            showCompass: false
          }), 'bottom-left');



        // Add popups for markers here. Yes, before the markers!  (part IV)
          var pambiche_popup = new mapboxgl.Popup({ offset: 25 })
            .setHTML('<a href="https://pambiche.com/">Pambiche</a>');
          
          var lumber_popup = new mapboxgl.Popup({ offset: 25 })
            .setHTML('<a href="https://worldforestry.org/">World Foresty Center</a>');
      
          var powells_popup = new mapboxgl.Popup({ offset: 25 })
            .setHTML('<a href="https://www.powells.com/">Powell\'s City of Books</a>');
          

        // Add any other variables such as markers here (part III)
          var pambiche_marker = new mapboxgl.Marker({color: '#780000'})
            .setLngLat([-122.636962, 45.526614]) // starting position [lng, lat] 
            .setPopup(pambiche_popup) // add the popup with the variable name 'popup' to this marker
            .addTo(map); // add the open marker to the map

          var lumber_marker = new mapboxgl.Marker({color:'#780000'})
            .setLngLat([-122.71809185431864, 45.51073921949513]) // starting position [lng, lat] 
            .setPopup(lumber_popup) // add the popup with the variable name 'popup' to this marker
            .addTo(map); // add the open marker to the map
          
          var powells_marker = new mapboxgl.Marker({color:'#780000'})
            .setLngLat([-122.6815950084674, 45.52326971217395]) // starting position [lng, lat] 
            .setPopup(powells_popup) // add the popup with the variable name 'popup' to this marker
            .addTo(map); // add the open marker to the map

          var welcome_popup_layer = new mapboxgl.Popup({closeOnClick: true, anchor: 'top-left'}) 
            .setLngLat([-122.67104382993759, 45.51457514624447]) //popup coordinates
            .setHTML('<h2>Welcome to Portland!</h2><p>This map shows three of the places I visited during a trip to Portland in February.<p>') //popup text
            .addTo(map); //add this popup to the map!

        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
